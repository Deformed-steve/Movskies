<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaFlix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e50914;
    --red-dark: #b0060f;
    --red-glow: rgba(229,9,20,0.35);
    --black: #0a0a0a;
    --dark: #111111;
    --card: #181818;
    --card-hover: #222222;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --text-muted: #999;
    --text-dim: #666;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }


  #nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 900;
    display: flex; align-items: center; gap: 32px;
    padding: 0 48px;
    height: 64px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 100%);
    transition: background 0.3s;
  }
  #nav.scrolled { background: rgba(10,10,10,0.97); border-bottom: 1px solid var(--border); }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--red);
    text-shadow: 0 0 20px var(--red-glow);
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .nav-links { display: flex; gap: 20px; }
  .nav-link {
    color: var(--text-muted); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: color 0.2s; white-space: nowrap;
  }
  .nav-link:hover, .nav-link.active { color: #fff; }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  #search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.6); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 12px;
    transition: border-color 0.2s, width 0.3s;
    width: 200px;
  }
  #search-wrap:focus-within { border-color: #fff; width: 280px; }
  #search-wrap svg { color: var(--text-muted); flex-shrink: 0; }
  #search-input {
    background: none; border: none; outline: none;
    color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px;
    width: 100%;
  }
  #search-input::placeholder { color: var(--text-dim); }


  #hero {
    position: relative; height: 88vh; min-height: 520px;
    display: flex; align-items: flex-end;
    overflow: hidden;
  }
  #hero-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center top;
    transition: opacity 0.8s ease;
  }
  #hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%
    ),
    linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,0.3) 30%, transparent 60%);
  }
  #hero-content {
    position: relative; z-index: 2;
    padding: 0 48px 80px;
    max-width: 680px;
  }
  #hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--red); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    padding: 4px 10px; border-radius: 2px;
    margin-bottom: 16px; text-transform: uppercase;
  }
  #hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 72px);
    line-height: 1; letter-spacing: 2px;
    color: #fff; margin-bottom: 16px;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
  }
  #hero-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .hero-score {
    color: #46d369; font-weight: 700; font-size: 14px;
  }
  .hero-year, .hero-runtime, .hero-genres {
    color: var(--text-muted); font-size: 13px;
  }
  .dot { color: var(--text-dim); }
  #hero-overview {
    font-size: 15px; line-height: 1.6; color: #ccc;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden; margin-bottom: 24px;
  }
  #hero-buttons { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-play {
    display: flex; align-items: center; gap: 8px;
    background: #fff; color: #000;
    border: none; border-radius: 4px;
    padding: 12px 28px; font-size: 16px; font-weight: 700;
    font-family: 'Outfit', sans-serif; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-play:hover { background: #e5e5e5; transform: scale(1.03); }
  .btn-more {
    display: flex; align-items: center; gap: 8px;
    background: rgba(109,109,110,0.7); color: #fff;
    border: none; border-radius: 4px;
    padding: 12px 24px; font-size: 16px; font-weight: 600;
    font-family: 'Outfit', sans-serif; cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s, transform 0.15s;
  }
  .btn-more:hover { background: rgba(109,109,110,0.9); transform: scale(1.03); }
  #hero-indicators {
    position: absolute; bottom: 28px; right: 48px; z-index: 2;
    display: flex; gap: 6px;
  }
  .hero-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.35); cursor: pointer;
    transition: background 0.3s, transform 0.2s;
  }
  .hero-dot.active { background: var(--red); transform: scale(1.3); }

  /* ── ROWS ── */
  .section { padding: 0 0 40px; }
  .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: 20px; font-weight: 700;
    color: #fff; padding: 0 48px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title span { color: var(--red); font-size: 13px; font-weight: 500; cursor: pointer; }
  .section-title span:hover { text-decoration: underline; }
  .row-wrap { position: relative; }
  .row-scroll {
    display: flex; gap: 10px;
    padding: 8px 48px 12px;
    overflow-x: auto; overflow-y: visible;
    scroll-behavior: smooth;
    scrollbar-width: none;
  }
  .row-scroll::-webkit-scrollbar { display: none; }
  .row-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 40px; height: 80px;
    background: rgba(10,10,10,0.85);
    border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; z-index: 10;
    opacity: 0; transition: opacity 0.2s;
  }
  .row-wrap:hover .row-btn { opacity: 1; }
  .row-btn:hover { background: rgba(229,9,20,0.3); border-color: var(--red); }
  .row-btn.left { left: 4px; }
  .row-btn.right { right: 4px; }

  /* ── CARD ── */
  .card {
    flex-shrink: 0;
    width: 180px; border-radius: 6px;
    overflow: hidden; cursor: pointer;
    position: relative;
    transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94), z-index 0s;
    background: var(--card);
  }
  .card:hover { transform: scale(1.08); z-index: 50; }
  .card-img {
    width: 100%; aspect-ratio: 2/3;
    object-fit: cover; display: block;
    background: var(--card);
  }
  .card-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
    opacity: 0; transition: opacity 0.25s;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 12px;
  }
  .card:hover .card-overlay { opacity: 1; }
  .card-title {
    font-size: 12px; font-weight: 600; color: #fff;
    margin-bottom: 4px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta { display: flex; gap: 6px; align-items: center; }
  .card-score { color: #46d369; font-size: 11px; font-weight: 700; }
  .card-year { color: var(--text-muted); font-size: 11px; }
  .card-play {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(229,9,20,0.9);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover .card-play { opacity: 1; }
  .card-type-badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.75); color: var(--red);
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 2px;
    text-transform: uppercase;
  }

  /* ── MODAL ── */
  #modal-overlay {
    position: fixed; inset: 0; z-index: 950;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    padding: 20px;
  }
  #modal-overlay.open { opacity: 1; pointer-events: all; }
  #modal {
    background: var(--dark);
    border-radius: 8px; overflow: hidden;
    width: 100%; max-width: 860px; max-height: 90vh;
    overflow-y: auto;
    transform: scale(0.92);
    transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    border: 1px solid var(--border);
    position: relative;
  }
  #modal-overlay.open #modal { transform: scale(1); }
  #modal-hero {
    position: relative; height: 360px; overflow: hidden;
    background: var(--card);
  }
  #modal-hero-img {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  #modal-hero::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--dark) 0%, rgba(17,17,17,0.1) 60%, transparent 100%);
  }
  #modal-hero-content {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    padding: 28px 32px 20px;
  }
  #modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px; letter-spacing: 2px; color: #fff;
    margin-bottom: 12px; line-height: 1;
  }
  #modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-modal-play {
    display: flex; align-items: center; gap: 7px;
    background: #fff; color: #000;
    border: none; border-radius: 4px;
    padding: 10px 22px; font-size: 15px; font-weight: 700;
    font-family: 'Outfit', sans-serif; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-modal-play:hover { background: #e5e5e5; }
  #modal-close {
    position: absolute; top: 14px; right: 14px; z-index: 10;
    background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    border-radius: 50%; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff;
    transition: background 0.2s;
  }
  #modal-close:hover { background: var(--red); border-color: var(--red); }
  #modal-body { padding: 20px 32px 32px; }
  #modal-meta-row {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 16px;
  }
  .modal-score { color: #46d369; font-weight: 700; font-size: 15px; }
  .modal-year, .modal-runtime, .modal-lang {
    color: var(--text-muted); font-size: 13px;
  }
  .modal-tag {
    border: 1px solid var(--border); color: var(--text-muted);
    font-size: 11px; padding: 2px 8px; border-radius: 3px;
  }
  #modal-overview { font-size: 14px; line-height: 1.7; color: #ccc; margin-bottom: 20px; }
  #modal-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .genre-pill {
    background: rgba(229,9,20,0.15); border: 1px solid rgba(229,9,20,0.3);
    color: #ff6b6b; font-size: 12px; font-weight: 500;
    padding: 4px 12px; border-radius: 20px;
  }
  /* Season/Episode picker */
  #season-picker { margin-bottom: 24px; }
  #season-picker label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .ep-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .ep-select {
    background: var(--card); border: 1px solid var(--border);
    color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px;
    padding: 8px 12px; border-radius: 4px; cursor: pointer; outline: none;
  }
  .ep-select:focus { border-color: var(--red); }
  .btn-ep-play {
    display: flex; align-items: center; gap: 6px;
    background: var(--red); color: #fff;
    border: none; border-radius: 4px;
    padding: 8px 18px; font-size: 14px; font-weight: 600;
    font-family: 'Outfit', sans-serif; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-ep-play:hover { background: var(--red-dark); }
  /* Similar */
  #similar-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 14px; }
  #similar-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .sim-card {
    border-radius: 4px; overflow: hidden; cursor: pointer;
    position: relative; background: var(--card);
    transition: transform 0.2s;
  }
  .sim-card:hover { transform: scale(1.05); }
  .sim-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .sim-title {
    padding: 6px; font-size: 11px; color: var(--text-muted);
    line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ── PLAYER ── */
  #player-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: #000;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #player-overlay.open { opacity: 1; pointer-events: all; }
  #player-top-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px;
    background: rgba(0,0,0,0.8);
    flex-shrink: 0;
  }
  #player-back {
    background: none; border: none; color: #fff; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Outfit', sans-serif; font-size: 14px;
    opacity: 0.8; transition: opacity 0.2s;
  }
  #player-back:hover { opacity: 1; }
  #player-info { flex: 1; }
  #player-title { font-size: 16px; font-weight: 600; color: #fff; }
  #player-subtitle { font-size: 13px; color: var(--text-muted); }
  #player-logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    letter-spacing: 2px; color: var(--red);
  }
  #player-frame-wrap { flex: 1; position: relative; }
  #player-frame {
    width: 100%; height: 100%; border: none;
    display: block;
  }

  /* ── SEARCH ── */
  #search-results {
    position: fixed; top: 64px; left: 0; right: 0; z-index: 800;
    background: rgba(10,10,10,0.97); border-bottom: 1px solid var(--border);
    padding: 24px 48px;
    display: none;
    min-height: 200px;
  }
  #search-results.open { display: block; }
  #search-results-title { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  #search-results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
  }

  /* ── FOOTER ── */
  footer {
    padding: 48px 48px 32px;
    border-top: 1px solid var(--border);
    margin-top: 32px;
  }
  .footer-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px;
    color: var(--red); margin-bottom: 16px;
  }
  footer p { color: var(--text-dim); font-size: 12px; line-height: 1.8; }
  footer a { color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--red); }

  /* ── LOADING SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, #222 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skel-card { width: 180px; aspect-ratio: 2/3; flex-shrink: 0; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    color: #fff; font-size: 14px; padding: 12px 24px;
    border-radius: 6px; z-index: 9999;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* ── MISC ── */
  .page { display: none; }
  .page.active { display: block; }
  #home-page { padding-top: 0; }

  @media (max-width: 768px) {
    #nav { padding: 0 16px; }
    #hero-content { padding: 0 16px 60px; }
    .section-title { padding: 0 16px; }
    .row-scroll { padding: 8px 16px 12px; }
    #search-results { padding: 16px; }
    #modal-body { padding: 16px; }
    #modal-hero-content { padding: 20px 16px 16px; }
    #modal-title { font-size: 28px; }
    footer { padding: 32px 16px; }
    #search-wrap { width: 140px; }
    #search-wrap:focus-within { width: 180px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div class="nav-logo" onclick="goHome()">NovaFlix</div>
  <div class="nav-links">
    <div class="nav-link active" onclick="filterSection('all')">Home</div>
    <div class="nav-link" onclick="filterSection('movie')">Movies</div>
    <div class="nav-link" onclick="filterSection('tv')">TV Shows</div>
    <div class="nav-link" onclick="filterSection('trending')">Trending</div>
  </div>
  <div class="nav-right">
    <div id="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search-input" type="text" placeholder="Search..." autocomplete="off">
    </div>
  </div>
</nav>

<!-- SEARCH RESULTS -->
<div id="search-results">
  <div id="search-results-title">Search Results</div>
  <div id="search-results-grid"></div>
</div>

<!-- HOME PAGE -->
<div id="home-page" class="page active">

  <!-- HERO -->
  <section id="hero">
    <div id="hero-bg"></div>
    <div id="hero-content">
      <div id="hero-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        NovaFlix Trending
      </div>
      <div id="hero-title">Loading...</div>
      <div id="hero-meta">
        <span class="hero-score" id="hero-score"></span>
        <span class="dot">•</span>
        <span class="hero-year" id="hero-year"></span>
        <span class="dot">•</span>
        <span class="hero-runtime" id="hero-runtime"></span>
      </div>
      <div id="hero-overview"></div>
      <div id="hero-buttons">
        <button class="btn-play" id="hero-play" onclick="heroPlay()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Play
        </button>
        <button class="btn-more" id="hero-more" onclick="heroMore()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          More Info
        </button>
      </div>
    </div>
    <div id="hero-indicators"></div>
  </section>

  <!-- CONTENT ROWS -->
  <div id="rows-container" style="padding-top:8px;"></div>

</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <button id="modal-close" onclick="closeModalBtn()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="modal-hero">
      <img id="modal-hero-img" src="" alt="">
      <div id="modal-hero-content">
        <div id="modal-title"></div>
        <div id="modal-actions"></div>
      </div>
    </div>
    <div id="modal-body">
      <div id="modal-meta-row"></div>
      <div id="modal-overview"></div>
      <div id="modal-genres"></div>
      <div id="season-picker" style="display:none;"></div>
      <div id="similar-title" style="display:none;">More Like This</div>
      <div id="similar-grid"></div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div id="player-overlay">
  <div id="player-top-bar">
    <button id="player-back" onclick="closePlayer()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </button>
    <div id="player-info">
      <div id="player-title"></div>
      <div id="player-subtitle"></div>
    </div>
    <div id="player-logo">NovaFlix</div>
  </div>
  <div id="player-frame-wrap">
    <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">NovaFlix</div>
  <p>
    Stream movies &amp; TV shows in high quality.<br>
    Powered by <a href="https://www.themoviedb.org/" target="_blank">TMDB</a> &amp; VidKing.<br><br>
    &copy; 2025 NovaFlix. For personal use only.
  </p>
</footer>

<script>
const API_KEY = 'a63b70ca6288b339b0b556535449d1b9';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';
const PLAYER_BASE = 'https://novamath.net/player.html?type=';
const PLAYER_PARAMS = '?color=e50914&autoPlay=true&nextEpisode=true';

let heroItems = [];
let heroIndex = 0;
let heroTimer = null;
let currentModal = null;

// ── FETCH ──
async function tmdb(path, params = {}) {
  const url = new URL(BASE + path);
  url.searchParams.set('api_key', API_KEY);
  url.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const r = await fetch(url);
  if (!r.ok) throw new Error('TMDB error ' + r.status);
  return r.json();
}

function imgUrl(path, size = 'w500') {
  if (!path) return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300"><rect fill="%23181818" width="200" height="300"/><text fill="%23444" font-size="14" x="100" y="155" text-anchor="middle">No Image</text></svg>';
  return IMG + size + path;
}

function backdropUrl(path) {
  if (!path) return '';
  return IMG + 'original' + path;
}

// ── HERO ──
async function loadHero() {
  try {
    const [trendingMovies, trendingTV] = await Promise.all([
      tmdb('/trending/movie/week'),
      tmdb('/trending/tv/week')
    ]);
    const movies = trendingMovies.results.slice(0, 5).map(m => ({...m, media_type:'movie'}));
    const shows = trendingTV.results.slice(0, 5).map(s => ({...s, media_type:'tv'}));
    heroItems = [...movies, ...shows].sort(() => Math.random() - 0.5).slice(0, 8);

    const indicators = document.getElementById('hero-indicators');
    indicators.innerHTML = heroItems.map((_, i) =>
      `<div class="hero-dot ${i===0?'active':''}" onclick="setHero(${i})"></div>`
    ).join('');

    setHero(0);
    heroTimer = setInterval(() => setHero((heroIndex + 1) % heroItems.length), 7000);
  } catch(e) { console.error(e); }
}

function setHero(i) {
  heroIndex = i;
  const item = heroItems[i];
  if (!item) return;

  document.querySelectorAll('.hero-dot').forEach((d, j) => d.classList.toggle('active', j===i));

  const bg = document.getElementById('hero-bg');
  bg.style.backgroundImage = `url(${backdropUrl(item.backdrop_path)})`;

  document.getElementById('hero-title').textContent = item.title || item.name || '—';
  document.getElementById('hero-score').textContent = item.vote_average ? '★ ' + item.vote_average.toFixed(1) : '';
  const year = (item.release_date || item.first_air_date || '').slice(0,4);
  document.getElementById('hero-year').textContent = year;
  document.getElementById('hero-runtime').textContent = item.media_type === 'movie' ? 'Movie' : 'TV Series';
  document.getElementById('hero-overview').textContent = item.overview || '';
}

function heroPlay() {
  const item = heroItems[heroIndex];
  if (!item) return;
  if (item.media_type === 'movie') {
    playMovie(item.id, item.title);
  } else {
    playTV(item.id, item.name, 1, 1);
  }
}

function heroMore() {
  const item = heroItems[heroIndex];
  if (!item) return;
  openModal(item.id, item.media_type);
}

// ── ROWS ──
const rowDefs = [
  { title: 'Trending Now', endpoint: '/trending/all/week', type: 'all' },
  { title: 'Popular Movies', endpoint: '/movie/popular', type: 'movie' },
  { title: 'Top Rated Movies', endpoint: '/movie/top_rated', type: 'movie' },
  { title: 'Popular TV Shows', endpoint: '/tv/popular', type: 'tv' },
  { title: 'Top Rated TV Shows', endpoint: '/tv/top_rated', type: 'tv' },
  { title: 'Action & Adventure', endpoint: '/discover/movie', type: 'movie', params: { with_genres: '28' } },
  { title: 'Horror', endpoint: '/discover/movie', type: 'movie', params: { with_genres: '27' } },
  { title: 'Comedy', endpoint: '/discover/movie', type: 'movie', params: { with_genres: '35' } },
  { title: 'Science Fiction', endpoint: '/discover/movie', type: 'movie', params: { with_genres: '878' } },
  { title: 'Anime', endpoint: '/discover/tv', type: 'tv', params: { with_genres: '16', with_origin_country: 'JP' } },
  { title: 'Crime', endpoint: '/discover/movie', type: 'movie', params: { with_genres: '80' } },
  { title: 'Documentaries', endpoint: '/discover/movie', type: 'movie', params: { with_genres: '99' } },
  { title: 'Drama', endpoint: '/discover/tv', type: 'tv', params: { with_genres: '18' } },
  { title: 'Reality TV', endpoint: '/discover/tv', type: 'tv', params: { with_genres: '10764' } },
];

let visibleRows = new Set(['all']);

function filterSection(type) {
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  event && event.target && event.target.classList && event.target.classList.add('active');
  visibleRows = new Set([type]);
  renderRows();
}

function goHome() {
  visibleRows = new Set(['all']);
  document.querySelectorAll('.nav-link').forEach((l,i) => l.classList.toggle('active', i===0));
  renderRows();
  closeModalBtn();
  closePlayer();
}

async function renderRows() {
  const container = document.getElementById('rows-container');
  container.innerHTML = '';

  for (const row of rowDefs) {
    if (visibleRows.has('all') || visibleRows.has(row.type) ||
        (visibleRows.has('trending') && row.endpoint.includes('trending'))) {
      const el = createSkeletonRow(row.title);
      container.appendChild(el);
      loadRow(row, el);
    }
  }
}

function createSkeletonRow(title) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-title">${title}</div>
    <div class="row-wrap">
      <button class="row-btn left" onclick="scrollRow(this,-1)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="row-scroll">
        ${Array(8).fill('<div class="skeleton skel-card"></div>').join('')}
      </div>
      <button class="row-btn right" onclick="scrollRow(this,1)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  `;
  return sec;
}

async function loadRow(row, el) {
  try {
    const data = await tmdb(row.endpoint, row.params || {});
    const items = data.results || [];
    const scroll = el.querySelector('.row-scroll');
    scroll.innerHTML = items.map(item => {
      const mt = item.media_type || row.type;
      const title = item.title || item.name || '?';
      const year = (item.release_date || item.first_air_date || '').slice(0,4);
      const score = item.vote_average ? item.vote_average.toFixed(1) : '';
      return `
        <div class="card" onclick="openModal(${item.id},'${mt === 'all' ? (item.media_type||'movie') : mt}')">
          <img class="card-img" src="${imgUrl(item.poster_path)}" alt="${title}" loading="lazy">
          <div class="card-type-badge">${mt === 'tv' || item.media_type === 'tv' ? 'TV' : 'FILM'}</div>
          <div class="card-play">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <div class="card-overlay">
            <div class="card-title">${escapeHtml(title)}</div>
            <div class="card-meta">
              ${score ? `<span class="card-score">★ ${score}</span>` : ''}
              ${year ? `<span class="card-year">${year}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) { console.error(e); }
}

function scrollRow(btn, dir) {
  const scroll = btn.closest('.row-wrap').querySelector('.row-scroll');
  scroll.scrollBy({ left: dir * 540, behavior: 'smooth' });
}

// ── MODAL ──
async function openModal(id, mediaType) {
  currentModal = { id, mediaType };
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Reset
  document.getElementById('modal-title').textContent = 'Loading...';
  document.getElementById('modal-hero-img').src = '';
  document.getElementById('modal-actions').innerHTML = '';
  document.getElementById('modal-meta-row').innerHTML = '';
  document.getElementById('modal-overview').textContent = '';
  document.getElementById('modal-genres').innerHTML = '';
  document.getElementById('similar-grid').innerHTML = '';
  document.getElementById('similar-title').style.display = 'none';
  document.getElementById('season-picker').style.display = 'none';

  try {
    const [detail, similar] = await Promise.all([
      tmdb(`/${mediaType}/${id}`, { append_to_response: 'credits' }),
      tmdb(`/${mediaType}/${id}/similar`)
    ]);

    const title = detail.title || detail.name || '—';
    const year = (detail.release_date || detail.first_air_date || '').slice(0,4);
    const runtime = detail.runtime ? `${detail.runtime}m` :
      (detail.episode_run_time && detail.episode_run_time[0] ? `~${detail.episode_run_time[0]}m/ep` : '');
    const score = detail.vote_average ? detail.vote_average.toFixed(1) : '';
    const genres = detail.genres || [];
    const lang = detail.original_language ? detail.original_language.toUpperCase() : '';

    document.getElementById('modal-hero-img').src = backdropUrl(detail.backdrop_path) || imgUrl(detail.poster_path, 'w780');
    document.getElementById('modal-title').textContent = title;

    // Actions
    let actionsHtml = `
      <button class="btn-modal-play" onclick="modalPlay()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Play
      </button>
    `;
    document.getElementById('modal-actions').innerHTML = actionsHtml;

    // Meta
    document.getElementById('modal-meta-row').innerHTML = `
      ${score ? `<span class="modal-score">★ ${score}</span>` : ''}
      ${year ? `<span class="modal-year">${year}</span>` : ''}
      ${runtime ? `<span class="modal-runtime">${runtime}</span>` : ''}
      ${lang ? `<span class="modal-tag">${lang}</span>` : ''}
      <span class="modal-tag">${mediaType === 'tv' ? 'TV Series' : 'Movie'}</span>
      ${detail.adult ? '<span class="modal-tag">18+</span>' : ''}
    `;

    document.getElementById('modal-overview').textContent = detail.overview || 'No overview available.';

    document.getElementById('modal-genres').innerHTML = genres.map(g =>
      `<span class="genre-pill">${g.name}</span>`
    ).join('');

    // Season/Episode picker for TV
    if (mediaType === 'tv') {
      const seasons = (detail.seasons || []).filter(s => s.season_number > 0);
      if (seasons.length > 0) {
        const sp = document.getElementById('season-picker');
        sp.style.display = 'block';
        sp.innerHTML = `
          <label>Episode Selection</label>
          <div class="ep-controls">
            <select class="ep-select" id="season-sel" onchange="updateEpisodeSel(${id}, ${JSON.stringify(seasons).replace(/"/g,"'")})">
              ${seasons.map(s => `<option value="${s.season_number}">Season ${s.season_number}${s.name ? ' — ' + s.name : ''}</option>`).join('')}
            </select>
            <select class="ep-select" id="episode-sel">
              ${Array.from({length: seasons[0].episode_count || 1}, (_,i) =>
                `<option value="${i+1}">Episode ${i+1}</option>`).join('')}
            </select>
            <button class="btn-ep-play" onclick="modalPlayEpisode(${id})">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Play Episode
            </button>
          </div>
        `;
      }
    }

    // Similar
    const simItems = (similar.results || []).slice(0, 12);
    if (simItems.length > 0) {
      document.getElementById('similar-title').style.display = 'block';
      document.getElementById('similar-grid').innerHTML = simItems.map(s => {
        const st = s.title || s.name || '?';
        return `
          <div class="sim-card" onclick="openModal(${s.id},'${mediaType}')">
            <img class="sim-img" src="${imgUrl(s.poster_path)}" alt="${escapeHtml(st)}" loading="lazy">
            <div class="sim-title">${escapeHtml(st)}</div>
          </div>
        `;
      }).join('');
    }

  } catch(e) { console.error(e); }
}

async function updateEpisodeSel(id, seasons) {
  const seasonNum = parseInt(document.getElementById('season-sel').value);
  const season = seasons.find(s => s.season_number === seasonNum);
  const count = season ? season.episode_count : 1;
  document.getElementById('episode-sel').innerHTML = Array.from({length: count}, (_,i) =>
    `<option value="${i+1}">Episode ${i+1}</option>`).join('');
}

function modalPlay() {
  if (!currentModal) return;
  const { id, mediaType } = currentModal;
  if (mediaType === 'movie') {
    playMovie(id, document.getElementById('modal-title').textContent);
  } else {
    playTV(id, document.getElementById('modal-title').textContent, 1, 1);
  }
}

function modalPlayEpisode(id) {
  const season = document.getElementById('season-sel')?.value || 1;
  const episode = document.getElementById('episode-sel')?.value || 1;
  playTV(id, document.getElementById('modal-title').textContent, season, episode);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── PLAYER ──
function playMovie(id, title) {
  const url = `${PLAYER_BASE}/movie/${id}${PLAYER_PARAMS}`;
  openPlayer(url, title, 'Movie');
}

function playTV(id, title, season, episode) {
  const url = `${PLAYER_BASE}/tv/${id}/${season}/${episode}${PLAYER_PARAMS}`;
  openPlayer(url, title, `Season ${season} · Episode ${episode}`);
}

function openPlayer(url, title, subtitle) {
  document.getElementById('player-frame').src = url;
  document.getElementById('player-title').textContent = title || '';
  document.getElementById('player-subtitle').textContent = subtitle || '';
  document.getElementById('player-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  closeModalBtn();
}

function closePlayer() {
  document.getElementById('player-overlay').classList.remove('open');
  document.getElementById('player-frame').src = '';
  document.body.style.overflow = '';
}

// ── SEARCH ──
let searchTimeout = null;
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim();
  clearTimeout(searchTimeout);
  if (!q) {
    document.getElementById('search-results').classList.remove('open');
    return;
  }
  searchTimeout = setTimeout(() => doSearch(q), 400);
});

document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    this.value = '';
    document.getElementById('search-results').classList.remove('open');
  }
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('#search-wrap') && !e.target.closest('#search-results')) {
    document.getElementById('search-results').classList.remove('open');
  }
});

async function doSearch(q) {
  document.getElementById('search-results').classList.add('open');
  document.getElementById('search-results-title').textContent = `Results for "${q}"`;
  document.getElementById('search-results-grid').innerHTML =
    Array(6).fill('<div class="skeleton" style="height:160px;border-radius:4px;"></div>').join('');
  try {
    const data = await tmdb('/search/multi', { query: q });
    const items = (data.results || []).filter(i => i.media_type !== 'person' && i.poster_path).slice(0, 18);
    document.getElementById('search-results-grid').innerHTML = items.map(item => {
      const mt = item.media_type || 'movie';
      const title = item.title || item.name || '?';
      return `
        <div class="sim-card" onclick="openModal(${item.id},'${mt}');document.getElementById('search-results').classList.remove('open');document.getElementById('search-input').value=''">
          <img class="sim-img" src="${imgUrl(item.poster_path)}" alt="${escapeHtml(title)}" loading="lazy">
          <div class="sim-title">${escapeHtml(title)}</div>
        </div>
      `;
    }).join('') || '<div style="color:#666;font-size:14px;">No results found.</div>';
  } catch(e) {
    document.getElementById('search-results-grid').innerHTML = '<div style="color:#666;font-size:14px;">Search failed.</div>';
  }
}

// ── NAV SCROLL ──
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});

// ── UTILS ──
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── INIT ──
loadHero();
renderRows();
</script>
</body>
</html>
